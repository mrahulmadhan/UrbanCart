{% extends "base.html" %}
{% block content %}
<div class="hero">
    <h1>Shop <span>Smarter</span>, Live Better</h1>
    <p class="lead mt-2">Discover top products across Electronics, Fashion & more</p>
</div>

<div class="container my-5">
    <h4 class="fw-bold mb-4">Featured Products</h4>
    <div class="row g-4">
        {% for p in products %}
        <div class="col-md-4 col-sm-6">
            <div class="card product-card h-100">
                <img src="{{ p.image }}" alt="{{ p.name }}">
                <div class="card-body">
                    <span class="badge-cat">{{ p.category }}</span>
                    <h6 class="mt-2 fw-bold">{{ p.name }}</h6>
                    <p class="text-muted fw-semibold">₹{{ p.price }}</p>
                    <a href="/add_to_cart/{{ p.id }}" class="btn btn-cart">
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
