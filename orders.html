{% extends "base.html" %}
{% block content %}
<div class="container my-5">
    <h3 class="fw-bold mb-4"><i class="bi bi-receipt"></i> Order History</h3>
    {% if orders %}
        {% for o in orders %}
        <div class="order-card d-flex justify-content-between align-items-center">
            <div>
                <h6 class="mb-1 fw-bold">{{ o.product_name }}</h6>
                <small class="text-muted">Qty: {{ o.quantity }} &nbsp;|&nbsp; {{ o.date }}</small>
            </div>
            <span class="fw-bold text-success fs-5">₹{{ o.total }}</span>
        </div>
        {% endfor %}
    {% else %}
        <div class="text-center py-5">
            <i class="bi bi-inbox" style="font-size:4rem;color:#ccc"></i>
            <p class="mt-3 text-muted">No orders placed yet.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
